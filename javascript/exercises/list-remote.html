<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Remote Data</title>
    <script src="list-remote.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            /* Definimos un ancho máximo */
            margin: 0 auto;
            /* Ahora sí centra el contenido */
            padding: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        #button-container {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Estilo para que la sección de filtro se vea bien */
        #filter-rm {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group input {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            font-weight: bold;
            color: #fff;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            margin: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        #remote-data-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        section#filter-rm {
            max-width: 500px;
            margin: 40px auto;
            padding: 22px 32px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: none;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group input[type="text"] {
            padding: 10px 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            max-width: 320px;
            transition: border-color 0.2s ease;
        }

        .form-group input[type="text"]:focus {
            border-color: #007BFF;
        }

        .no-results {
            color: #6c757d;
            font-style: italic;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <h1>Display Remote Data</h1>

    <div id="button-container">
        <button class="btn" id="btn-countries">Load Countries</button>
        <button class="btn" id="btn-users">Load Users</button>
        <button class="btn" id="btn-characters">Load Rick and Morty Characters</button>
    </div>

    <section id="filter-rm">
        <h2>Filter Rick & Morty characters</h2>
        <div class="form-group">
            <label for="characterSearch">Search characters:</label>
            <input type="text" id="characterSearch" placeholder="e.g., Rick">
        </div>
    </section>

    <div id="remote-data-container"
        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;"></div>

</body>

</html>
